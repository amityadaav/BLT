<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════
         PRIMARY SEO META
    ═══════════════════════════════════════ -->
    <title>Bluelith Technology — AI & Software Solutions | Bengaluru</title>
    <meta name="description" content="Bluelith Technology is a full-service software company in Bengaluru. We design, develop, and scale AI-powered digital products for startups and enterprises worldwide." />
    <meta name="keywords" content="software company Bengaluru, web development India, AI solutions, UI UX design, product engineering, digital agency Bangalore" />
    <meta name="author" content="Bluelith Technology" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://www.bluelith.in/" />

    <!-- ═══════════════════════════════════════
         OPEN GRAPH (Facebook / LinkedIn)
    ═══════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.bluelith.in/" />
    <meta property="og:site_name" content="Bluelith Technology" />
    <meta property="og:title" content="Bluelith Technology — AI & Software Solutions" />
    <meta property="og:description" content="Strategy. Design. Engineering. Delivered. We build high-performance digital products for startups and enterprises worldwide." />
    <meta property="og:image" content="https://www.bluelith.in/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- ═══════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bluelith" />
    <meta name="twitter:creator" content="@bluelith" />
    <meta name="twitter:title" content="Bluelith Technology — AI & Software Solutions" />
    <meta name="twitter:description" content="Strategy. Design. Engineering. Delivered. We build high-performance digital products for startups and enterprises worldwide." />
    <meta name="twitter:image" content="https://www.bluelith.in/og-image.jpg" />

    <!-- ═══════════════════════════════════════
         GEO / LOCAL SEO
    ═══════════════════════════════════════ -->
    <meta name="geo.region" content="IN-KA" />
    <meta name="geo.placename" content="Bengaluru" />
    <meta name="geo.position" content="12.9716;77.5946" />
    <meta name="ICBM" content="12.9716, 77.5946" />

    <!-- ═══════════════════════════════════════
         FAVICONS
    ═══════════════════════════════════════ -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0d0d14" />

    <!-- ═══════════════════════════════════════
         PERFORMANCE — FONT PRECONNECT
         Avoids render-blocking font fetch
    ═══════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ═══════════════════════════════════════
         PERFORMANCE — IMAGE PRECONNECT
         Warms TCP for Unsplash (hero LCP image)
    ═══════════════════════════════════════ -->
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- ═══════════════════════════════════════
         PERFORMANCE — LCP IMAGE PRELOAD
         Tells browser to fetch the first hero
         image before JS/CSS is parsed.
         Update src to match images[0].src in Hero.jsx
    ═══════════════════════════════════════ -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=1400&q=80&auto=format&fit=crop"
      fetchpriority="high"
    />

    <!-- ═══════════════════════════════════════
         STRUCTURED DATA — Organization
    ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Bluelith Technology",
      "alternateName": "BlueLith",
      "url": "https://www.bluelith.in",
      "logo": "https://www.bluelith.in/favicon-32x32.png",
      "description": "Full-service software company in Bengaluru specialising in AI, web development, UI/UX design and product engineering.",
      "foundingLocation": "Bengaluru, India",
      "areaServed": "Worldwide",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-99059-06689",
        "contactType": "customer service",
        "email": "managingdirector@bluelith.in",
        "availableLanguage": ["English", "Hindi", "Kannada"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bengaluru",
        "addressRegion": "Karnataka",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://instagram.com/bluelith",
        "https://twitter.com/bluelith",
        "https://linkedin.com/company/bluelith"
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════
         STRUCTURED DATA — WebSite (Sitelinks Searchbox)
    ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Bluelith Technology",
      "url": "https://www.bluelith.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.bluelith.in/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════
         STRUCTURED DATA — LocalBusiness
    ═══════════════════════════════════════ -->

     crossorigin="anonymous"></script>
  </head>

</html>
